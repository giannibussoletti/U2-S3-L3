<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weather app</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
  </head>
  <body>
    <header class="text-center">
      <h1>Bel Vedere di Spinello</h1>
    </header>

    <main>
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8">
            <img
              class="card-img"
              src="https://www.turismosociale.org/wp-content/uploads/2024/01/belvedere-di-spinello.jpg"
              alt="Bel Vedere" />
            <section class="mt-3 d-flex justify-content-between">
              <div>MIN: <span id="min" class="fs-3">20°C</span></div>
              <div>CURRENT: <span id="current" class="fs-3">30°C</span></div>
              <div>MAX: <span id="max" class="fs-3">45°C</span></div>
            </section>
          </div>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <script src="./weather.js"></script>
  </body>
</html>
