<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Libreria</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
    <script src="https://kit.fontawesome.com/4cddab353b.js" crossorigin="anonymous"></script>
  </head>
  <body class="bg-secondary-subtle">
    <!-- Modale -->
    <div
      class="modal fade"
      id="cartModal"
      tabindex="-1"
      aria-labelledby="cartModalLabel"
      aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="cartModalLabel">Carello</h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="container">
              <div class="row"></div>
            </div>
          </div>
          <div class="modal-footer">
            <button id="svuota-carrello" class="btn btn-danger" onclick="EmptyCart()">
              Svuota Carrello
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- Modale -->

    <header><h1 class="text-center">Libreria</h1></header>
    <main>
      <div class="container">
        <div id="library" class="row"></div>
        <div id="cart" class="row position-fixed bottom-0 end-0 m-3 bg-white shadow-sm rounded-2">
          <div class="col">
            <button
              class="btn position-relative"
              data-bs-toggle="modal"
              data-bs-target="#cartModal">
              <span
                id="items-in-cart"
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"></span>
              <i class="fa-solid fa-cart-shopping" style="color: rgb(0, 0, 0)"></i>
            </button>
            <!-- Modale -->
          </div>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <script src="./libreria.js"></script>
  </body>
</html>
